<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Axis - المول التجاري الذكي</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f9; text-align: center; padding: 20px; }
        #avatar-container { 
            width: 100%; height: 350px; 
            background: linear-gradient(180deg, #ffffff 0%, #e8f0fe 100%);
            border-radius: 20px; margin-bottom: 20px;
        }
        .mall-panel { 
            border: 2px solid #28a745; padding: 25px; 
            border-radius: 15px; background: white; 
            display: inline-block; width: 90%; max-width: 600px;
        }
        .rent-btn { 
            background-color: #28a745; color: white; padding: 15px 30px; 
            border: none; border-radius: 8px; cursor: pointer; font-size: 18px; 
        }
        .rent-btn:hover { background-color: #218838; }
    </style>
</head>
<body>
    <div id="avatar-container"></div>
    <h1>مرحباً بك في مول 3D Axis التجاري</h1>
    <div class="mall-panel">
        <h3>قسم المستأجرين والشركات</h3>
        <p>هل ترغب في فتح متجرك الخاص في عالمنا الافتراضي؟</p>
        <button class="rent-btn" onclick="openContract()">إضغط هنا للاستئجار (عقد تجاري رسمي)</button>
    </div>
    <script>
        function openContract() {
            alert("ستظهر الآن لوحة بأسماء الأدوار وأنواع المتاجر وفئاتها... هذا يعتبر عقداً رسمياً.");
        }
    </script>
</body>
</html>
