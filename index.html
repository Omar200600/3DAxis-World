<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Axis - المدينة الذكية</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #eef2f7;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        h1 { color: #333; }
        .btn-group { margin-top: 30px; }
        .btn {
            display: inline-block;
            padding: 15px 30px;
            margin: 10px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            transition: transform 0.2s;
        }
        .btn-school { background-color: #007bff; }
        .btn-mall { background-color: #ff1493; }
        .btn:hover { transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="container">
        <h1>مرحباً بك في مدينة 3D Axis الذكية</h1>
        <p>بوابتك إلى مستقبل التجارة والتعليم في الميتافيرس</p>

        <div class="btn-group">
            <!-- رابط الدخول للمدرسة -->
            <a href="school/index.html" class="btn btn-school">دخول المدرسة الذكية</a>
            
            <!-- رابط الدخول للمول -->
            <a href="mall/index.html" class="btn btn-mall">دخول السوق التجاري</a>
        </div>
    </div>

    <!-- ربط كود الذكاء الموزع للمشروع -->
    <script src="ai-orchestrator.js"></script>
</body>
</html>
