<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>بوابة مدينة 3D Axis</title>
    <style>
        body { margin: 0; background: #000; color: gold; font-family: sans-serif; overflow: hidden; }
        canvas { position: fixed; top: 0; left: 0; z-index: -1; }
        .container { display: flex; justify-content: center; align-items: center; height: 100vh; gap: 25px; flex-wrap: wrap; }
        .card { 
            width: 200px; height: 260px; background: rgba(20,20,20,0.8); 
            border: 1px solid gold; border-radius: 15px; text-align: center;
            transition: 0.5s; cursor: pointer; display: flex; flex-direction: column; justify-content: center;
        }
        .card:hover { transform: scale(1.1); box-shadow: 0 0 30px gold; background: rgba(50,50,50,0.9); }
        .icon { font-size: 60px; margin-bottom: 10px; }
        h3 { margin: 0; font-size: 1.2em; }
    </style>
</head>
<body>
    <canvas id="p"></canvas>
    <div class="container">
        <div class="card" onclick="location.href='school/'">
            <div class="icon">🎓</div>
            <h3>مدرسة موازية</h3>
        </div>
        <div class="card" onclick="location.href='mall/'">
            <div class="icon">🛍️</div>
            <h3>سوق 3D</h3>
        </div>
        <div class="card" onclick="location.href='#'">
            <div class="icon">🏢</div>
            <h3>برج الأعمال</h3>
        </div>
        <div class="card" onclick="location.href='#'">
            <div class="icon">🕊️</div>
            <h3>مبنى الأمل</h3>
        </div>
    </div>
    <script>
        const c=document.getElementById('p'), x=c.getContext('2d');
        let w=c.width=window.innerWidth, h=c.height=window.innerHeight;
        const pts=[];
        for(let i=0;i<100;i++) pts.push({x:Math.random()*w, y:Math.random()*h, s:Math.random()*2, vx:Math.random()*0.5-0.25, vy:Math.random()*0.5-0.25});
        function draw(){
            x.clearRect(0,0,w,h); x.fillStyle='gold';
            pts.forEach(p=>{
                p.x+=p.vx; p.y+=p.vy;
                if(p.x<0||p.x>w)p.vx*=-1; if(p.y<0||p.y>h)p.vy*=-1;
                x.beginPath(); x.arc(p.x,p.y,p.s,0,Math.PI*2); x.fill();
            });
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body><script src="ai-orchestrator.js"></script>
</html>
