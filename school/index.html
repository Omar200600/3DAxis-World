<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Axis - المدرسة الذكية</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f0f8ff; 
            text-align: center; 
            padding: 20px; 
            margin: 0;
        }
        /* تنسيق وعاء الأفاتار ليظهر في الأعلى بشكل احترافي */
        #avatar-container { 
            width: 100%; 
            height: 350px; 
            background: radial-gradient(circle, #ffffff 0%, #d0e7ff 100%);
            border-radius: 20px;
            margin-bottom: 20px;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.05);
        }
        .avatar-box { 
            border: 2px dashed #007bff; 
            padding: 20px; 
            border-radius: 15px; 
            background: white; 
            display: inline-block;
            max-width: 80%;
        }
        h1 { color: #0056b3; }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            color: #007bff;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <!-- 1. مكان ظهور الأفاتار (المعلم الافتراضي) في مقدمة الصفحة -->
    <div id="avatar-container"></div>

    <!-- 2. محتوى المدرسة -->
    <h1>مرحباً بك في المدرسة الافتراضية الذكية</h1>
    
    <div class="avatar-box">
        <p>هنا سيجد الطلاب دروس الفيزياء والكيمياء المدعومة بالذكاء الاصطناعي.</p>
        <button onclick="alert('سيقوم المعلم الافتراضي بمساعدتك قريباً!')" style="padding: 10px 20px; cursor: pointer;">
            تحدث مع المعلم الافتراضي
        </button>
    </div>
    
    <br>
    <a href="../index.html" class="back-link">← العودة للساحة الرئيسية</a>

    <!-- 3. استدعاء المحرك الذكي (ai-orchestrator.js) لربط المجسم 3D -->
    <!-- لاحظ السهمين /.. لكي نخرج من مجلد school ونصل للملف في الخارج -->
    <script type="module" src="../ai-orchestrator.js"></script>

</body>
</html>
